name: Build and Release Windows Executable

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install exact dependencies required by your code
        pip install PyQt5 pynput pygame pywin32 pyinstaller

    - name: Compile with PyInstaller
      # Using the spec file ensures your data files and build settings are consistent
      run: pyinstaller DMod.spec

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/dmod.exe
        name: Release ${{ github.ref_name }}